# 模板文件：程序运行时不会读取本文件，请复制为同目录下的 etf_config.yaml 再编辑。
# etf_config.yaml 已在 .gitignore。密钥建议只放环境变量或 .env。

data_dir: data
memory_file: watchlist_memory.json

# ---------- 大模型（OpenAI 兼容接口，任意厂商同一套字段）----------
api_key: null
model_name: gpt-4o-mini
# 接口 Base URL，需含 /v1。留空则使用 SDK 默认（一般为 OpenAI 官方）。
# DeepSeek 示例：https://api.deepseek.com/v1
model_url: null

use_mock_llm: true

max_agent_steps: 12
use_akshare_daily: true
# AKShare 日线拉取跨度（自然日），越大越慢；范围约 5～3650
akshare_daily_lookback_days: 120

# ---------- 交易偏好（大模型 system 中必须遵守）----------
trading_preferences:
  risk_tolerance: moderate
  investment_horizon: medium_term
  max_single_position_pct: 15
  avoid_industries:
    - 示例行业
  avoid_keywords:
    - ST
  focus_themes:
    - 示例主题
  must_follow_text: |
    在此写入你的硬性规则，例如：不做杠杆；单日加仓不超过总资金 5%；
    与偏好冲突时宁可 hold 并在理由中说明。
